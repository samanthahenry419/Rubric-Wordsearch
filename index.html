function Blank({ id, selectedBlank, setSelectedBlank, fills, correct, shake, gameOver }) {
  const isCorrect = correct[id];
  const isSelected = selectedBlank === id;
  const isShaking = shake === id;
  const filledWord = ALL_WORDS.find(w => w.id === fills[id])?.word;

  if (isCorrect) {
    return (
      <span style={{
        display: "inline-block", padding: "1px 8px", margin: "0 2px",
        borderRadius: 3, border: "1.5px solid #00b887",
        background: "#00b88718", color: "#00b887",
        fontWeight: 700, fontSize: 13, verticalAlign: "middle", whiteSpace: "nowrap",
      }}>{filledWord}</span>
    );
  }
  return (
    <span
      onClick={() => !gameOver && setSelectedBlank(id === selectedBlank ? null : id)}
      style={{
        display: "inline-block", minWidth: 80, padding: "1px 8px", margin: "0 2px",
        borderRadius: 3,
        border: isSelected ? "1.5px solid #1a73e8" : "1.5px dashed #bbb",

        animation: isShaking ? "shake 0.4s" : "none",
      }}
    >

    </span>
  );
}

function Callout({ color, children }) {

  return (
    <div style={{
      background: c.bg,
      borderRadius: 6, padding: "12px 16px",
      margin: "10px 0", fontSize: 15, lineHeight: 1.65, color: "#333",
    }}>{children}</div>
  );
}

  return (

          filter: i < lives ? "none" : "grayscale(1)",

  );
}

    const expected = ANSWER_KEY[selectedBlank];

      setFills(f => ({ ...f, [selectedBlank]: word.id }));
      setCorrect(newCorrect);
      setWordBank(wb => wb.map(w => w.id === word.id ? { ...w, used: true } : w));

                ]} />

                <H2>4 — 🟢 Videographer Prepared and Available Until Start Time 🙂 · 6 points</H2>
                <P><strong>Videographers must be available and keep their camera on until the witness is sworn in.</strong></P>
                <Callout color="green">The 30-minute period before the depo starts is perhaps the most important portion — it's when most technical issues arise and when you greet and introduce yourself.</Callout>
                <OL items={[
                  <>When the backup starts, you are on camera with <B id="b7" /> and lighting that reflects the framing guide provided by Steno.</>,
                  "The camera was left on from when you joined the room until the deponent is sworn in.",
                  "You aren't actively distracted — no visible phone, eating, or sleeping.",
                  <>Your Zoom tile matches: <strong>"First Name Last Name (Videographer)"</strong></>,
                  "You are visibly wearing headphones.",
                ]} />

                <H2>5 — 🟢 Witness Framing 🖼️ · 10 points</H2>
                <P><strong>Work with the witness to secure the best framing, lighting, and the least distracting background as possible.</strong></P>
                <Callout color="green">This step is crucial in making sure the video products we create, which may be used in court, capture every response and reaction from the witness at the highest quality achievable.</Callout>
                <OL items={[
                  "Witness must be fully in frame — the full face of the deponent must be captured.",
                  "Witness must be sufficiently lit so that their facial features can be clearly seen.",
                  "Witness must be centered in the frame, and auto-framing/Center Stage must be disabled.",
                  "Mobile devices must be rotated to landscape and set on a stable surface.",
                  <>If the deponent's backdrop is <B id="b20" />, you may opt to blur it. All virtual backgrounds must be removed or changed to blurred.</>,
                ]} />

                <H2>6 — 🟢 Spotlight the Witness 🔦 · 10 points</H2>
                <P><strong><B id="b8" /> the witness for the Zoom cloud recording prior to going on the record.</strong></P>
                <Callout color="green">This is another <strong>critical task</strong> and objectively the most important for our editors. This makes the Zoom cloud recording highlight the witness for the duration of the meeting.</Callout>
                <OL items={[
                  "The spotlight must be set before going on the record for points to be awarded.",
                  "If the spotlight is removed while on the record, reapply and make a note on the worksheet, checking 'missed spotlight' on any impacted sessions.",
                ]} />
                <Note>IMPORTANT: If the spotlight is removed after the initial session and not reapplied before going back on the record, points can't be awarded in the "Responsive to Issues" portion of the rubric.</Note>

                <H2>7 — 🟢 Confirm Full Legal Name of Witness 🔤 · 4 points</H2>
                <P><strong>The videographer must confirm the full, <B id="b9" /> name of the deponent and update the Zoom tile and Worksheet.</strong></P>
                <Callout color="green">Confirming the full legal name and renaming the Zoom tile ensures our video products hold the legal weight they are intended to. This is one of the most commonly missed tasks.</Callout>
                <OL items={[
                  <>You must include the words '<strong>Full</strong>' and '<strong>Legal</strong>' when asking the witness to confirm their full legal name.</>,
                  "After updates to the witness's Zoom tile, you must receive verbal confirmation from the witness that you correctly updated the spelling.",
                  <>Full <B id="b21" /> names must be included if provided by the deponent.</>,
                ]} />

                <H2>8 — 🟢 Zconn Mention 📨 · 4 points</H2>
                <P><strong>Discuss the SC App with the Taking Attorney, or ensure whether they are going to use it or not.</strong></P>
                <Callout color="green">Steno Connect is one of our biggest selling points at Steno. It's up to you to make sure it's available to our clients!</Callout>
                <OL items={[
                  "Talk to the TA about the app. Mention the SC app by name and confirm if they'd like to use it.",
                  "Send out the invite to all participants in the room.",
                  "The app must be discussed and invite sent in every job, including B2Bs.",
                ]} />

                <H2>9 — 🟢 Read the General Recommendations ☝️ · 4 points</H2>
                <P><strong>Read the General Recommendations before reading on the record, either in full or the Abridged Recs.</strong></P>
                <Callout color="green">The General Recommendations provide valuable information to all participants regarding expectations and best practices.</Callout>
                <OL items={[
                  <>Certain portions of information must be mentioned during general recs:
                    <OL indent={1} items={[
                      <>The room is being recorded and will be securely stored for <B id="b15" /></>,
                      "Spotlight instructions",
                      "Your phone number",
                    ]} />
                  </>,
                  "There are instances where the general recommendations can be skipped or modified, such as upon direct request of the TA, or for Complex Cases.",
                ]} />
                <BQ>Rule of thumb: Unless you've specifically been asked not to, at least include the abridged recommendations on every job.</BQ>

                <H2>10 — 🟢 Read the Official Read-On in Full 🎙️ · 6 points</H2>
                <P><strong>Read full read-on, including the full legal witness name, date, time, time zone, case name, venue, and number.</strong></P>
                <Callout color="green">This official introduction statement must be read accurately so the recording holds the legal weight it is intended to.</Callout>
                <OL items={[
                  <>The Read On was read correctly — this must be read <B id="b10" /> (word-for-word) to receive full points. Do not add or subtract anything.</>,
                  "Be mindful of abbreviations when reading the official read-on.",
                  "Confirm any unclear information with the TA before the depo starts.",
                  <>Individual characters in the <strong>Case Number</strong> must be read — do not join characters together.</>,
                ]} />

                <H2>11 — 🔵 Taking Depo On/Off the Record 🚦 · 6 points</H2>
                <P><strong>Take the depo on/off-the-record using the phrase, "We are now on/off the record. The time is HH:MM AM/PM, Timezone" verbatim.</strong></P>
                <Callout color="blue">Reading On/Off correctly is another essential part of creating a consistent depo experience as well as adhering to legal standards.</Callout>
                <OL items={[
                  "Nothing is added/excluded from the read-on/off.",
                  <>The read on/offs were done promptly and correctly. If you take longer than <B id="b11" /> to respond to a call to go off the record, points will not be awarded.</>,
                  "You did not go off the record if counsel disagreed about doing so.",
                  "In the case of read-offs, all counsel must be in clear agreement.",
                ]} />
                <Note>Note: Don't add Daylight or Standard when reading time zones, and be sure to say "time" at the end, such as "Pacific Time".</Note>

                <H2>12 — 🔵 Responsiveness to Issues Throughout ❗ · 6 points</H2>
                <P><strong>Any significant issues encountered during the depo are sufficiently resolved by the videographer.</strong></P>
                <Callout color="blue">As the designated room facilitator, you should be the one to notice when audio/video needs addressing.</Callout>
                <OL items={[
                  <>More serious issues were actively addressed using all available resources including <B id="b19" />.</>,
                  "You gauged the importance of minor issues, addressing those impacting the Audio/Video product or causing participants to struggle.",
                  <>Spotlight of deponent, if dropped, must be replaced within <B id="b14" /> of it dropping for points to be awarded. If dropped during a break, replace it before going back on the record.</>,
                  "You kept the TA in mind and followed their instructions.",
                ]} />
                <Note>NOTE: Please request to go off the record before actively troubleshooting!</Note>

                <H2>13 — 🟣 Read the Official Read-Off in Full 🎙️ · 6 points</H2>
                <P><strong>Read the full read-off, including the volume number, full witness name, case name, time, and time zone.</strong></P>
                <Callout color="purple">This official closing statement must be read verbatim to receive full points.</Callout>
                <OL items={[
                  "Nothing was added/subtracted from the read-off. All important pieces of information were present and accurately stated.",
                  <>Classification of witness (<B id="b17" />, PMK, or any specific degree/designation such as M.D.) was maintained across the read-on and read-off.</>,
                  "Any abbreviations were stated correctly. Example: Witness John Doe, M.D. is read, 'John Doe, Medical Doctor'",
                  <>You correctly read the <B id="b16" /> number — for Volume 1, simply read "This concludes the deposition of…"</>,
                ]} />

                <H2>14 — 🟣 Asked for Video Orders On the Record 📝 · 4 points</H2>
                <P><strong>Verify all attorneys have been asked for orders, either by asking the group for video and transcript orders or by clarifying orders with each participant.</strong></P>
                <Callout color="purple">Confirming how the client would like their video order prevents the editing team from having to go back and re-edit a deposition.</Callout>
                <OL items={[
                  "Orders were stated on the record. As long as all counsel stated their orders, this is considered complete.",
                  "If the CR took orders or counsel stated orders before you could ask, this still counts.",
                  "Confirm standing orders and check the job notes.",
                ]} />
                <BQ><strong>Complex Cases</strong> have standing orders. You do not need to ask for video orders at the end of a Complex Case deposition.</BQ>
                <BQ>If a depo is <B id="b12" />, you don't need to ask for orders on the record. However, you can follow the CR's lead and ask for video orders while still on-the-record.</BQ>

                <H2>15 — 🟣 Orders <em>and</em> Video Worksheet/Ops are Correct 📥 · 10 points</H2>
                <P><strong>The <B id="b13" /> MUST MATCH all information stated on the OBS recording, including sessions, read-on/off times, and video orders.</strong></P>
                <Callout color="purple">The worksheet is what communicates details of a depo to several other teams at Steno. Errors could lead to issues for the editing team or even client-impacting effects.</Callout>
                <OL items={[
                  "All information was updated — Job details, Deponent Name, Taking Attorney, and case details.",
                  "No sessions are missed, and the on and off-the-record times accurately reflect what is stated on the video record.",
                  "Video orders (or lack thereof) match what was collected from counsel.",
                  "Accurate product information was given if asked by counsel.",
                ]} />
                <Callout color="pink">Note on Additional Orders: Ensure that any PiP or T2PiP products are actually producible for the job before taking them down on the worksheet.</Callout>

                <HR />

                <H1>Quality Feedback Reports 🗃️</H1>
                <P>Videographer performance is measured on a monthly basis and resets at the beginning of every month. You will receive a <strong>Quality Feedback Report</strong> for each job reviewed through automation, which will post directly to your <B id="b18" />.</P>
                <P>The Quality Feedback Report is a tool for both you and your direct supervisor to identify high-performance areas and areas of improvement. You can get more frequent updates by meeting with your direct supervisor using the 1:1 Meeting Calendly Link at the top of your PMC channel.</P>
                <H2>ADDITIONAL RESOURCES:</H2>
                <UL items={[<a href="https://app.getguru.com/card/c67MxGri/Abbreviations-Symbols-Guide" style={{ color: "#1a73e8" }}>PMQ, PMK, Individual, Abbreviations &amp; Symbols</a>]} />

              </div>{/* end scroll */}

              {/* ── Word Bank ── */}
              <div style={{ borderTop: "2px solid #e0e0e0", background: "#fafafa", padding: "10px 20px 12px", flexShrink: 0 }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 7 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#555", textTransform: "uppercase", letterSpacing: "0.07em" }}>Word Bank</span>
                    {!selectedBlank && !gameOver && <span style={{ fontSize: 11, color: "#aaa" }}>Click a blank in the card above, then select the missing word</span>}
                    {selectedBlank && !gameOver && <span style={{ fontSize: 11, color: "#1a73e8", fontWeight: 600 }}>▸ Now select the correct word below</span>}
                    {gameOver && <span style={{ fontSize: 11, color: "#c62828", fontWeight: 700 }}>Game over — no lives remaining</span>}
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <span style={{ fontSize: 11, color: "#888", fontWeight: 600 }}>Lives:</span>
                      <Hearts lives={lives} />
                    </div>
                    <div style={{ display: "flex", alignItems: "center", gap: 5 }}>
                      <div style={{ height: 5, width: 100, borderRadius: 3, background: "#e0e0e0", overflow: "hidden" }}>
                        <div style={{ height: "100%", borderRadius: 3, width: `${progress}%`, background: progress === 100 ? "#00b887" : "#1a73e8", transition: "width 0.4s ease" }} />
                      </div>
                      <span style={{ fontSize: 11, color: "#888", whiteSpace: "nowrap" }}>{correctCount}/{TOTAL_BLANKS}</span>
                    </div>
                    <button onClick={handleReset} style={{ fontSize: 11, padding: "3px 10px", borderRadius: 12, border: "1px solid #ddd", background: "#fff", cursor: "pointer", color: "#666" }}>↺ Reset</button>
                  </div>
                </div>

                <div style={{ display: "flex", flexWrap: "wrap", gap: 5 }}>
                  {wordBank.map(word => (
                    <button key={word.id} onClick={() => handleWordClick(word)} disabled={word.used || gameOver}
                      style={{
                        padding: "4px 12px", borderRadius: 20,
                        border: word.used ? "1.5px solid #eee"
                          : selectedBlank && !word.used
                            ? "1.5px solid #1a73e8"
                            : "1.5px solid #ddd",
                        background: word.used ? "#f5f5f5"
                          : selectedBlank && !word.used
                            ? "#e8f0fe"
                            : "#fff",
                        color: word.used ? "#ccc"
                          : selectedBlank && !word.used
                            ? "#1a73e8"
                            : "#333",
                        fontSize: 12.5, fontWeight: 600,
                        cursor: word.used || gameOver ? "default" : "pointer",
                        transition: "all 0.15s",
                        textDecoration: word.used ? "line-through" : "none",
                        transform: selectedBlank && !word.used ? "scale(1.04)" : "scale(1)",
                        boxShadow: selectedBlank && !word.used ? "0 2px 8px rgba(26,115,232,0.15)" : "none",
                      }}>
                      {word.word}
                    </button>
                  ))}
                </div>

              </div>
            </div>
          </div>
        </div>{/* end chrome */}

        {/* Game Over Modal */}
        {gameOver && !showCelebration && (
          <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.55)", backdropFilter: "blur(4px)" }}>
            <div style={{ background: "#fff", borderRadius: 20, padding: "44px 52px", textAlign: "center", boxShadow: "0 40px 80px rgba(0,0,0,0.4)", maxWidth: 400 }}>
              <div style={{ fontSize: 60, marginBottom: 10 }}>💔</div>
              <h2 style={{ fontSize: 22, fontWeight: 800, color: "#c62828", margin: "0 0 6px" }}>Out of Lives</h2>
              <p style={{ color: "#666", fontSize: 14, margin: "0 0 18px", lineHeight: 1.6 }}>You used all 3 lives before finishing. Review the QA Rubric card and try again — you've got this.</p>
              <div style={{ background: "#fff5f5", border: "1px solid #ffcdd2", borderRadius: 10, padding: "10px 18px", marginBottom: 22 }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: "#c62828" }}>{correctCount}/{TOTAL_BLANKS} correct before game over</span>
              </div>
              <button onClick={handleReset} style={{ background: "#c62828", color: "#fff", border: "none", borderRadius: 12, padding: "10px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Try Again</button>
            </div>
          </div>
        )}

        {/* Win Modal */}
        {showCelebration && (
          <div style={{ position: "absolute", inset: 0, zIndex: 200, display: "flex", alignItems: "center", justifyContent: "center", background: "rgba(0,0,0,0.5)", backdropFilter: "blur(4px)" }}>
            <div style={{ background: "#fff", borderRadius: 20, padding: "48px 56px", textAlign: "center", boxShadow: "0 40px 80px rgba(0,0,0,0.4)", maxWidth: 420 }}>
              <div style={{ fontSize: 64, marginBottom: 12 }}>🏆</div>
              <h2 style={{ fontSize: 24, fontWeight: 800, color: "#1a1a1a", margin: "0 0 8px" }}>Rubric Expert!</h2>
              <p style={{ color: "#666", fontSize: 14, margin: "0 0 18px", lineHeight: 1.6 }}>
                You nailed all {TOTAL_BLANKS} blanks with {lives} {lives === 1 ? "life" : "lives"} to spare. The Vid Squad is lucky to have you.
              </p>
              <div style={{ background: "#e8fdf6", border: "1px solid #00b887", borderRadius: 10, padding: "12px 20px", marginBottom: 22, display: "flex", alignItems: "center", justifyContent: "center", gap: 12 }}>
                <span style={{ fontSize: 17, fontWeight: 800, color: "#00b887" }}>{TOTAL_BLANKS}/{TOTAL_BLANKS} correct</span>
                <span style={{ color: "#ccc" }}>·</span>
                <Hearts lives={lives} />
                <span style={{ fontSize: 12, color: "#777" }}>remaining</span>
              </div>
              <button onClick={handleReset} style={{ background: "#00b887", color: "#fff", border: "none", borderRadius: 12, padding: "10px 28px", fontSize: 14, fontWeight: 600, cursor: "pointer" }}>Play Again</button>
            </div>
          </div>
        )}
      </div>

      <style>{`
        @keyframes shake {
          0%, 100% { transform: translateX(0); }
          25% { transform: translateX(-6px); }
          75% { transform: translateX(6px); }
        }
        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }
      `}</style>
    </div>
  );
}
        
        // === PASTE EVERYTHING YOU COPIED FROM CLAUDE ABOVE THIS LINE ===

        const Root = ReactDOM.createRoot(document.getElementById('root'));
        Root.render(<QARubricMission />);
    </script>
</body>
</html>
